<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>watchlist v1</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>watchlist v1</h1>
    
    <button id="darkModeToggle" class="mb-30">toggle darkmode</button>

    <div class="tab-container mb-30">
      <button id="tabBtnList" class="tab-btn active" onclick="switchTab('list')">my movies</button>
      <button id="tabBtnAdd" class="tab-btn" onclick="switchTab('add')">add / edit</button>
    </div>

<div id="tabList">
      <h2>my movies</h2>
      
      <input 
        type="text" 
        id="searchInput" 
        placeholder="search by title or comment..." 
        style="width: 100%; box-sizing: border-box; margin-bottom: 20px;"
      >
      
      <div id="loadingText">loading movies from database...</div>
      <ul id="movieList">
        </ul>
    </div>

    <div id="tabAdd" class="add-movie-section hidden">
      <h3 id="formTitle">add a new movie</h3>
      
      <div class="input-group">
        <label>movie: </label>
        <input type="text" id="movieTitle">
      </div>

      <div class="input-group">
        <label>rating: </label>
        <input type="number" step="0.5" min="0" max="10" id="movieRating" class="short-input">
        <span> / 10</span>
      </div>

      <div class="input-group">
        <label>comment: </label>
        <textarea id="movieComment" rows="3" placeholder="what did you think?"></textarea>
      </div>

      <div class="input-group">
        <label>admin api key: </label>
        <input type="password" id="apiKeyInput">
      </div>

      <button id="submitMovieBtn">submit movie</button>
      <button id="cancelEditBtn" class="hidden">cancel edit</button>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
